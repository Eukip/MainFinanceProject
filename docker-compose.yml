# docker-compose.yml
version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    restart: unless-stopped

  # ====================== DEV ======================
  # docker compose --profile dev up --build
  app-dev:
    profiles: ["dev"]
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src

  # ====================== PRODUCTION ======================
  # docker compose --profile prod up --build -d
  postgres:
    profiles: ["prod"]
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: main_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  app-prod:
    profiles: ["prod"]
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
